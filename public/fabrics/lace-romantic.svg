<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="laceBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefcfa" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f8f4f0" stop-opacity="0.95" />
    </linearGradient>
    <!-- Floral pattern -->
    <pattern id="floral" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Center flower -->
      <circle cx="20" cy="20" r="3" fill="none" stroke="#e0d5c8" stroke-width="0.8" />
      <circle cx="20" cy="20" r="6" fill="none" stroke="#d8cdc0" stroke-width="0.5" />
      <!-- Petals -->
      <ellipse cx="20" cy="12" rx="2" ry="4" fill="none" stroke="#ddd2c5" stroke-width="0.6" />
      <ellipse cx="20" cy="28" rx="2" ry="4" fill="none" stroke="#ddd2c5" stroke-width="0.6" />
      <ellipse cx="12" cy="20" rx="4" ry="2" fill="none" stroke="#ddd2c5" stroke-width="0.6" />
      <ellipse cx="28" cy="20" rx="4" ry="2" fill="none" stroke="#ddd2c5" stroke-width="0.6" />
      <!-- Diagonal petals -->
      <ellipse cx="14" cy="14" rx="2" ry="3" fill="none" stroke="#e2d8cc" stroke-width="0.5" transform="rotate(-45 14 14)" />
      <ellipse cx="26" cy="14" rx="2" ry="3" fill="none" stroke="#e2d8cc" stroke-width="0.5" transform="rotate(45 26 14)" />
      <ellipse cx="14" cy="26" rx="2" ry="3" fill="none" stroke="#e2d8cc" stroke-width="0.5" transform="rotate(45 14 26)" />
      <ellipse cx="26" cy="26" rx="2" ry="3" fill="none" stroke="#e2d8cc" stroke-width="0.5" transform="rotate(-45 26 26)" />
      <!-- Connecting dots -->
      <circle cx="5" cy="5" r="1" fill="#e5dcd0" fill-opacity="0.6" />
      <circle cx="35" cy="5" r="1" fill="#e5dcd0" fill-opacity="0.6" />
      <circle cx="5" cy="35" r="1" fill="#e5dcd0" fill-opacity="0.6" />
      <circle cx="35" cy="35" r="1" fill="#e5dcd0" fill-opacity="0.6" />
    </pattern>
    <!-- Mesh overlay -->
    <pattern id="laceMesh" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="4" x2="8" y2="4" stroke="#ebe3d8" stroke-width="0.3" stroke-opacity="0.4" />
      <line x1="4" y1="0" x2="4" y2="8" stroke="#ebe3d8" stroke-width="0.3" stroke-opacity="0.4" />
    </pattern>
  </defs>
  <rect width="256" height="256" fill="url(#laceBg)" />
  <rect width="256" height="256" fill="url(#laceMesh)" />
  <rect width="256" height="256" fill="url(#floral)" />
</svg>
