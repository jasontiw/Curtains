<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="blackoutBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a45" stop-opacity="1" />
      <stop offset="50%" stop-color="#2d2d38" stop-opacity="1" />
      <stop offset="100%" stop-color="#3a3a45" stop-opacity="1" />
    </linearGradient>
    <!-- Satin sheen effect -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <!-- Subtle fabric texture -->
    <pattern id="satinTex" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="2" fill="#ffffff" fill-opacity="0.02" />
      <rect x="2" y="2" width="2" height="2" fill="#000000" fill-opacity="0.02" />
    </pattern>
  </defs>
  <rect width="256" height="256" fill="url(#blackoutBg)" />
  <rect width="256" height="256" fill="url(#satinTex)" />
  <rect width="256" height="256" fill="url(#sheen)" />
</svg>
